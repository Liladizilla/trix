<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - Cyberzilla</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="GlassIcons.css" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script>
    (function(){
      emailjs.init("Si0WeEW47pAIBakXo");
    })();
  </script>
</head>
<body>
  <div class="scroll-progress" id="scrollProgress"></div>
  
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="store.html">Digital Store</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero" id="home">
    <h1>Contact Us</h1>
    <p>Get in touch for AI & Automation solutions</p>
  </section>

  <main>
    <section class="services">
      <h2 class="section-title">Send a Message</h2>
      <div class="services-container">
        <div class="service-item" style="width: 90%; max-width: 700px; grid-column: 1 / -1;">
          <form id="contact-form" style="width: 100%;">
            <input type="text" name="from_name" placeholder="Your Name" required style="width:100%; padding:15px; margin:15px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,255,0.3); border-radius: 10px; color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 1rem;"/>
            <input type="email" name="from_email" placeholder="Your Email" required style="width:100%; padding:15px; margin:15px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,255,0.3); border-radius: 10px; color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 1rem;"/>
            <textarea name="message" placeholder="Your Message" rows="5" required style="width:100%; padding:15px; margin:15px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,255,0.3); border-radius: 10px; color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 1rem;"></textarea>
            <button type="submit" class="cta-btn" style="width: 100%;">Send Message</button>
          </form>
          <p id="status-msg" style="margin-top:20px; text-align: center;"></p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 CYBERZILLA Technologies. All rights reserved.</p>
  </footer>

  <script>
    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollTop || document.documentElement.scrollTop;
      const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const progress = (scrollTop / scrollHeight) * 100;
      document.getElementById('scrollProgress').style.width = progress + '%';
    });

    const form = document.getElementById('contact-form');
    const statusMsg = document.getElementById('status-msg');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      emailjs.sendForm("service_xerbh4g", "", this)
        .then(() => {
          statusMsg.textContent = "Message sent successfully!";
          statusMsg.style.color = "#00ff00";
          form.reset();
        }, (error) => {
          statusMsg.textContent = "Failed to send. Try again later.";
          statusMsg.style.color = "#ff0000";
          console.error('FAILED...', error);
        });
    });
  </script>
</body>
</html>
